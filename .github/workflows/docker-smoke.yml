name: Docker Smoke Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  docker-smoke:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker image
      run: |
        make docker-build
    
    - name: Test pytest in container
      run: |
        make docker-test
    
    - name: Verify c3d availability
      run: |
        docker run --rm --entrypoint c3d oxytcmri:local --version